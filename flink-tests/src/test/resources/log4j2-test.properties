# Set root logger level to OFF to not flood build logs
# set manually to INFO for debugging purposes
rootLogger.level = INFO
rootLogger.appenderRef.test.ref = TestLogger
logger.flink.name = org.apache.flink.streaming.runtime.io
logger.flink.level = DEBUG
logger.flink2.name = org.apache.flink.runtime.checkpoint.channel
logger.flink2.level = ERROR
logger.flink3.name = org.apache.flink.runtime.io.network
logger.flink3.level = ERROR


appender.testlogger.name = TestLogger
appender.testlogger.type = CONSOLE
appender.testlogger.target = SYSTEM_ERR
appender.testlogger.layout.type = PatternLayout
appender.testlogger.layout.pattern = %-4r [%t] %-5p %c %x - %m%n
