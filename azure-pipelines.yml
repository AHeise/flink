trigger:
  branches:
    include:
    - '*' 

jobs:
  - job: Build
#    pool: alibaba
    steps:
      - task: Gradle@2
        displayName: Compile
        inputs:
          gradleWrapperFile: 'gradlew'
          javaHomeOption: 'JDKVersion'
          jdkVersionOption: '1.8'
          jdkArchitectureOption: 'x64'
          publishJUnitResults: true
          tasks: 'build'
          options: '--scan'
        env:
          CI: true